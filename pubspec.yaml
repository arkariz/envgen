name: envflare_cli
description: "A tool to generate flavor environment variable files for Flutter projects using envied."
version: 1.0.1
homepage: https://github.com/arkariz/envflare_cli
repository: https://github.com/arkariz/envflare_cli

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  args: ^2.7.0
  path: ^1.9.1
  envied: ^1.3.4

dev_dependencies:
  melos: ^7.5.1
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  envied_generator: ^1.3.4

executables:
  envflare: envflare

melos:
  repository: https://github.com/arkariz/envflare_cli
  useRootAsPackage: true
  command:
    version:
      branch: main
      workspaceChangelog: false